name: Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Upload artifact for deployment
      uses: actions/upload-artifact@v4
      with:
        name: python-app
        path: .
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: python-app
        path: .

    - name: Azure Login (service principal)
      if: ${{ env.AZURE_CREDENTIALS_JSON != '' }}
      uses: azure/login@v2
      with:
        creds: ${{ env.AZURE_CREDENTIALS_JSON }}
    
    - name: Deploy to Azure Web App (publish profile)
      if: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'weather-env-data-lookup'
        publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: Deploy to Azure Web App (azure login)
      if: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE == '' && env.AZURE_CREDENTIALS_JSON != '' }}
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'weather-env-data-lookup'
        package: .
